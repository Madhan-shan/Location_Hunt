<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Location Tracker — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e28;
    --border: #252a36;
    --accent: #3ecf8e;
    --accent-dim: #1a3d2e;
    --text: #e8eaf0;
    --muted: #6b7280;
    --sans: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .topbar-brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
  .dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(1.5); } }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    border-radius: 8px; border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 13px; font-family: var(--sans); cursor: pointer; transition: border-color 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .main { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 53px); }

  .sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
  .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .count-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); font-weight: 600; }

  .pings-list { overflow-y: auto; flex: 1; }
  .pings-list::-webkit-scrollbar { width: 3px; }
  .pings-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .ping-item { padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
  .ping-item:hover { background: var(--surface2); }
  .ping-item.active { background: var(--surface2); border-left-color: var(--accent); }

  .ping-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .ping-num { font-size: 13px; font-weight: 600; color: var(--text); }
  .ping-time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .ping-address { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 5px; }
  .ping-coords { font-size: 11px; font-family: var(--mono); color: var(--accent); opacity: 0.8; }
  .ping-status { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 7px; border-radius: 4px; margin-top: 7px; }
  .ping-status.gps { background: var(--accent-dim); color: var(--accent); }
  .ping-status.denied { background: #3d1515; color: #ef4444; }
  .maps-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent); font-size: 11px; font-family: var(--sans); cursor: pointer; text-decoration: none; margin-top: 8px; transition: background 0.15s; }
  .maps-btn:hover { background: #25503e; }

  .map-panel { display: flex; flex-direction: column; overflow: hidden; }
  #map { flex: 1; width: 100%; }

  .info-strip { border-top: 1px solid var(--border); background: var(--surface); padding: 14px 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .info-cell { display: flex; flex-direction: column; gap: 4px; }
  .info-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .info-value { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .info-value.accent { color: var(--accent); }

  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 200px; color: var(--muted); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .leaflet-tile { filter: brightness(0.65) saturate(0.7); }
  .leaflet-container { background: #1a1e28; }
  .custom-marker { width: 14px; height: 14px; background: var(--accent); border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 0 0 5px rgba(62,207,142,0.2); }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
    .map-panel { order: -1; }
    .info-strip { grid-template-columns: 1fr 1fr; }
    .sidebar { height: 100%; }
  }
</style>
</head>
<body>

<script>
  /* ── FILL THESE IN ── */
  var SUPABASE_URL = "https://fccizufvtgqdxpkuwjrm.supabase.co";
  var SUPABASE_KEY = "sb_publishable_LG3h8OQ8XKXj-cvt6Ii3XA_m-014x8tE";
  /* ────────────────── */
</script>

<div class="topbar">
  <div class="topbar-brand">
    <div class="dot"></div>
    Location Tracker — Live Dashboard
  </div>
  <button class="refresh-btn" onclick="loadPings()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    Refresh
  </button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>All Pings</h2>
      <span class="count-badge" id="count">0</span>
    </div>
    <div class="pings-list" id="pingsList">
      <div class="state-box"><div class="spinner"></div><span>Loading...</span></div>
    </div>
  </div>

  <div class="map-panel">
    <div id="map"></div>
    <div class="info-strip">
      <div class="info-cell">
        <div class="info-label">Latitude</div>
        <div class="info-value accent" id="infoLat">—</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Longitude</div>
        <div class="info-value accent" id="infoLng">—</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Accuracy</div>
        <div class="info-value" id="infoAcc">—</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Captured at</div>
        <div class="info-value" id="infoTime">—</div>
      </div>
    </div>
  </div>
</div>

<script>
var map = L.map('map').setView([20, 78], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 19
}).addTo(map);

var markers = [];
var pings   = [];

var icon = L.divIcon({
  className: '',
  html: '<div class="custom-marker"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7]
});

function timeSince(iso) {
  if (!iso) return '—';
  var s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return s + 's ago';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

async function reverseGeocode(lat, lng) {
  try {
    var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng, { headers:{'Accept-Language':'en'} });
    var d = await r.json();
    return d.display_name || (lat.toFixed(5)+', '+lng.toFixed(5));
  } catch(e) { return lat.toFixed(5)+', '+lng.toFixed(5); }
}

function selectPing(i) {
  var p = pings[i];
  document.querySelectorAll('.ping-item').forEach(function(el,j){ el.classList.toggle('active', j===i); });
  document.getElementById('infoLat').textContent  = p.latitude  ? p.latitude.toFixed(6)  : '—';
  document.getElementById('infoLng').textContent  = p.longitude ? p.longitude.toFixed(6) : '—';
  document.getElementById('infoAcc').textContent  = p.accuracy  ? Math.round(p.accuracy)+'m' : '—';
  document.getElementById('infoTime').textContent = p.captured_at ? new Date(p.captured_at).toLocaleString() : '—';
  if (p.latitude && p.longitude) {
    map.flyTo([p.latitude, p.longitude], 16, {duration:1.2});
    markers.forEach(function(m,j){ if(m) m.setOpacity(j===i ? 1 : 0.3); });
  }
}

function renderList() {
  var list = document.getElementById('pingsList');
  document.getElementById('count').textContent = pings.length;

  if (!pings.length) {
    list.innerHTML = '<div class="state-box"><span>No pings yet — send the link to your phone.</span></div>';
    return;
  }

  list.innerHTML = '';
  pings.forEach(function(p, i) {
    var hasGPS = p.latitude && p.longitude;
    var el = document.createElement('div');
    el.className = 'ping-item';
    el.onclick = function(){ selectPing(i); };
    el.innerHTML =
      '<div class="ping-top">'+
        '<span class="ping-num">Ping #'+p.id+'</span>'+
        '<span class="ping-time">'+timeSince(p.captured_at)+'</span>'+
      '</div>'+
      '<div class="ping-address" id="addr'+i+'">'+
        (hasGPS ? 'Fetching address...' : 'Location access was denied')+
      '</div>'+
      (hasGPS ? '<div class="ping-coords">'+p.latitude.toFixed(5)+', '+p.longitude.toFixed(5)+'</div>' : '')+
      '<span class="ping-status '+(hasGPS?'gps':'denied')+'">'+
        (hasGPS ? '● GPS captured' : '✕ Denied')+
      '</span>'+
      (hasGPS ? '<br><a class="maps-btn" href="'+p.maps_link+'" target="_blank">↗ Open in Google Maps</a>' : '');
    list.appendChild(el);

    if (hasGPS) {
      var m = L.marker([p.latitude, p.longitude], {icon:icon}).addTo(map)
        .bindPopup('<b>Ping #'+p.id+'</b><br>'+new Date(p.captured_at).toLocaleString());
      markers.push(m);
      reverseGeocode(p.latitude, p.longitude).then(function(addr){
        var a = document.getElementById('addr'+i);
        if (a) a.textContent = addr;
      });
    } else {
      markers.push(null);
    }
  });

  var first = pings.findIndex(function(p){ return p.latitude && p.longitude; });
  if (first !== -1) selectPing(first);
}

async function loadPings() {
  markers.forEach(function(m){ if(m) map.removeLayer(m); });
  markers = [];
  try {
    var res = await fetch(SUPABASE_URL+'/rest/v1/locations?select=*&order=id.desc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
    });
    pings = await res.json();
    renderList();
  } catch(e) {
    document.getElementById('pingsList').innerHTML =
      '<div class="state-box"><span style="color:#ef4444">Failed to load. Check your keys.</span></div>';
  }
}

loadPings();
setInterval(loadPings, 30000);
</script>
</body>
</html>
