<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Location Tracker — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0c10; --surface: #12151c; --surface2: #1a1e28;
    --border: #252a36; --accent: #3ecf8e; --accent-dim: #1a3d2e;
    --text: #e8eaf0; --muted: #6b7280; --danger: #ef4444;
    --warn: #f59e0b; --info: #60a5fa;
    --sans: 'Inter', sans-serif; --mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Topbar ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; }
  .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); font-weight: 600; }
  .btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; font-family: var(--sans); cursor: pointer; transition: border-color .2s, color .2s; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* ── Main layout ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
  .sidebar-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-head h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .ping-list { overflow-y: auto; flex: 1; }
  .ping-list::-webkit-scrollbar { width: 3px; }
  .ping-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .ping-card { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; border-left: 2px solid transparent; transition: background .15s; }
  .ping-card:hover { background: var(--surface2); }
  .ping-card.active { background: var(--surface2); border-left-color: var(--accent); }
  .ping-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .ping-id { font-size: 13px; font-weight: 600; }
  .ping-time { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .ping-location { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ping-coords { font-size: 11px; font-family: var(--mono); color: var(--accent); opacity: 0.8; margin-bottom: 5px; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .tag.gps     { background: var(--accent-dim); color: var(--accent); }
  .tag.ip      { background: #1e3a5f; color: var(--info); }
  .tag.denied  { background: #3d1515; color: var(--danger); }
  .tag.device  { background: var(--surface2); color: var(--muted); border: 0.5px solid var(--border); }

  /* ── Right panel ── */
  .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Map ── */
  #map { height: 55%; min-height: 200px; }
  .leaflet-tile { filter: brightness(0.65) saturate(0.7); }
  .leaflet-container { background: #1a1e28; }
  .custom-marker { width: 14px; height: 14px; background: var(--accent); border: 2.5px solid #fff; border-radius: 50%; box-shadow: 0 0 0 5px rgba(62,207,142,0.2); }
  .custom-marker.ip-marker { background: var(--info); box-shadow: 0 0 0 5px rgba(96,165,250,0.2); }

  /* ── Detail panel ── */
  .detail-panel { flex: 1; overflow-y: auto; background: var(--surface); border-top: 1px solid var(--border); }
  .detail-panel::-webkit-scrollbar { width: 3px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); }

  .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; }

  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: var(--border); }
  .detail-cell { background: var(--surface); padding: 12px 16px; }
  .detail-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; }
  .detail-value { font-size: 13px; color: var(--text); font-family: var(--mono); word-break: break-all; line-height: 1.5; }
  .detail-value.accent { color: var(--accent); }
  .detail-value.info   { color: var(--info); }
  .detail-value.warn   { color: var(--warn); }
  .detail-value.muted  { color: var(--muted); }

  /* maps link row */
  .maps-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; }
  .maps-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--accent); background: var(--accent-dim); color: var(--accent); font-size: 12px; font-family: var(--sans); cursor: pointer; text-decoration: none; transition: background .15s; }
  .maps-btn:hover { background: #25503e; }
  .maps-btn.ip-btn { border-color: var(--info); background: #1e3a5f; color: var(--info); }
  .maps-btn.ip-btn:hover { background: #1e4a7f; }
  .maps-btn svg { width: 13px; height: 13px; }

  /* Section header inside detail */
  .section-head { padding: 10px 16px 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); border-top: 1px solid var(--border); background: var(--surface2); }
  .section-head:first-child { border-top: none; }

  /* ── States ── */
  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px 20px; color: var(--muted); font-size: 13px; }
  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    #map { height: 35vh; }
  }
</style>
</head>
<body>

<script>
  var SUPABASE_URL = "https://fccizufvtgqdxpkuwjrm.supabase.co";
  var SUPABASE_KEY = "sb_publishable_LG3h8OQ8XKXj-cvt6Ii3XA_m-014x8t";
</script>

<!-- Topbar -->
<div class="topbar">
  <div class="brand"><div class="dot"></div>📍 Location Tracker — Dashboard</div>
  <div class="topbar-right">
    <span class="badge" id="countBadge">0 pings</span>
    <button class="btn" onclick="loadPings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Refresh
    </button>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar: ping list -->
  <div class="sidebar">
    <div class="sidebar-head">
      <h2>All Pings</h2>
      <span style="font-size:11px;color:var(--muted);" id="autoRefreshLabel">auto-refresh 30s</span>
    </div>
    <div class="ping-list" id="pingList">
      <div class="state-box"><div class="spinner"></div><span>Loading...</span></div>
    </div>
  </div>

  <!-- Right: map + detail -->
  <div class="right-panel">
    <div id="map"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty">← Select a ping to see full details</div>
    </div>
  </div>

</div>

<script>
var map = L.map('map').setView([20, 78], 4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);

var pings = [], markers = [], selectedIndex = -1;

var gpsIcon = L.divIcon({ className:'', html:'<div class="custom-marker"></div>', iconSize:[14,14], iconAnchor:[7,7] });
var ipIcon  = L.divIcon({ className:'', html:'<div class="custom-marker ip-marker"></div>', iconSize:[14,14], iconAnchor:[7,7] });

function timeSince(iso) {
  if (!iso) return '—';
  var s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return s + 's ago';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}
function fmt(v, fallback) { return (v !== null && v !== undefined && v !== '') ? v : (fallback || '—'); }

function shortAddress(p) {
  if (p._address) return p._address;
  if (p.city && p.country) return p.city + ', ' + p.country;
  if (p.country) return p.country;
  if (p.latitude) return p.latitude.toFixed(4) + ', ' + p.longitude.toFixed(4);
  return 'No location';
}

async function reverseGeocode(lat, lng) {
  try {
    var r = await fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng, { headers:{'Accept-Language':'en'} });
    var d = await r.json();
    return d.display_name || null;
  } catch(e) { return null; }
}

function renderDetail(p) {
  var hasGPS = p.latitude && p.longitude;
  var hasIP  = p.ip_lat && p.ip_lng;

  var html = '';

  /* ── Location ── */
  html += '<div class="section-head">📍 Location</div>';
  html += '<div class="detail-grid">';

  if (hasGPS) {
    html += cell('GPS Latitude',  p.latitude.toFixed(6), 'accent');
    html += cell('GPS Longitude', p.longitude.toFixed(6), 'accent');
    html += cell('Accuracy', p.accuracy ? Math.round(p.accuracy) + ' metres' : '—', '');
    html += cell('Location Type', 'GPS (precise)', 'accent');
  } else if (hasIP) {
    html += cell('IP Latitude',  p.ip_lat.toFixed(4), 'info');
    html += cell('IP Longitude', p.ip_lng.toFixed(4), 'info');
    html += cell('Accuracy', 'City-level (IP)', '');
    html += cell('Location Type', 'IP-based (approx)', 'warn');
  } else {
    html += cell('Location', 'Not captured', 'muted');
    html += cell('Reason', fmt(p.maps_link), 'muted');
  }

  html += cell('City',    fmt(p.city), '');
  html += cell('Region',  fmt(p.region), '');
  html += cell('Country', fmt(p.country), '');
  html += cell('IP Address', fmt(p.ip_address), 'info');
  html += cell('Captured', p.captured_at ? new Date(p.captured_at).toLocaleString() : '—', '');
  html += '</div>';

  /* Google Maps buttons */
  html += '<div class="maps-row">';
  if (hasGPS) {
    html += '<a class="maps-btn" href="https://maps.google.com/?q='+p.latitude+','+p.longitude+'" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Open GPS location</a>';
  }
  if (hasIP) {
    html += '<a class="maps-btn ip-btn" href="https://maps.google.com/?q='+p.ip_lat+','+p.ip_lng+'" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Open IP location</a>';
  }
  html += '</div>';

  /* ── Device ── */
  html += '<div class="section-head">📱 Device</div>';
  html += '<div class="detail-grid">';
  html += cell('Device Model', fmt(p.device), '');
  html += cell('Operating System', fmt(p.os), '');
  html += cell('Browser', fmt(p.browser), '');
  html += cell('Screen Size', fmt(p.screen_size), '');
  html += cell('Battery', fmt(p.battery), p.battery && p.battery.includes('charging') ? 'accent' : '');
  html += cell('Network', fmt(p.network), '');
  html += cell('Language', fmt(p.language), '');
  html += '</div>';

  /* ── Raw ── */
  html += '<div class="section-head">🔍 User Agent</div>';
  html += '<div class="detail-grid">';
  html += cell('Full User Agent', fmt(p.user_agent), 'muted');
  html += '</div>';

  document.getElementById('detailPanel').innerHTML = html;
}

function cell(label, value, cls) {
  return '<div class="detail-cell"><div class="detail-label">'+label+'</div><div class="detail-value '+cls+'">'+escHtml(String(value))+'</div></div>';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function selectPing(i) {
  selectedIndex = i;
  var p = pings[i];
  document.querySelectorAll('.ping-card').forEach(function(el,j){ el.classList.toggle('active', j===i); });
  renderDetail(p);

  /* Fly map */
  var lat = p.latitude || p.ip_lat;
  var lng = p.longitude || p.ip_lng;
  if (lat && lng) {
    map.flyTo([lat, lng], p.latitude ? 15 : 11, {duration:1.2});
    markers.forEach(function(m,j){ if(m) m.setOpacity(j===i ? 1 : 0.3); });
  }
}

function renderList() {
  var list = document.getElementById('pingList');
  document.getElementById('countBadge').textContent = pings.length + ' ping' + (pings.length !== 1 ? 's' : '');

  if (!pings.length) {
    list.innerHTML = '<div class="state-box"><span>No pings yet — send the link!</span></div>';
    return;
  }

  list.innerHTML = '';
  pings.forEach(function(p, i) {
    var hasGPS = p.latitude && p.longitude;
    var hasIP  = p.ip_lat && p.ip_lng;

    var el = document.createElement('div');
    el.className = 'ping-card';
    el.onclick = function(){ selectPing(i); };

    var tagsHtml = '';
    if (hasGPS)      tagsHtml += '<span class="tag gps">● GPS</span>';
    else if (hasIP)  tagsHtml += '<span class="tag ip">◎ IP-based</span>';
    else             tagsHtml += '<span class="tag denied">✕ No location</span>';
    if (p.device)    tagsHtml += '<span class="tag device">'+escHtml(p.device)+'</span>';
    if (p.browser)   tagsHtml += '<span class="tag device">'+escHtml(p.browser)+'</span>';

    el.innerHTML =
      '<div class="ping-row"><span class="ping-id">Ping #'+p.id+'</span><span class="ping-time">'+timeSince(p.captured_at)+'</span></div>'+
      '<div class="ping-location" id="addr'+i+'">'+escHtml(shortAddress(p))+'</div>'+
      (hasGPS ? '<div class="ping-coords">'+p.latitude.toFixed(4)+', '+p.longitude.toFixed(4)+'</div>' :
       hasIP  ? '<div class="ping-coords" style="color:var(--info)">~'+p.ip_lat.toFixed(2)+', '+p.ip_lng.toFixed(2)+' (IP)</div>' : '')+
      '<div class="tags">'+tagsHtml+'</div>';

    document.getElementById('pingList').appendChild(el);

    /* Map marker */
    var mLat = p.latitude || p.ip_lat;
    var mLng = p.longitude || p.ip_lng;
    if (mLat && mLng) {
      var icon = p.latitude ? gpsIcon : ipIcon;
      var m = L.marker([mLat, mLng], {icon:icon}).addTo(map)
        .bindPopup('<b>Ping #'+p.id+'</b><br>'+(p.device||'')+'<br>'+new Date(p.captured_at).toLocaleString());
      markers.push(m);
    } else {
      markers.push(null);
    }

    /* Reverse geocode GPS pings for sidebar label */
    if (hasGPS && !p._address) {
      reverseGeocode(p.latitude, p.longitude).then(function(addr){
        if (addr) {
          p._address = addr.split(',').slice(0,3).join(',');
          var el2 = document.getElementById('addr'+i);
          if (el2) el2.textContent = p._address;
          if (selectedIndex === i) renderDetail(p);
        }
      });
    }
  });

  /* Auto-select first GPS ping */
  var first = pings.findIndex(function(p){ return p.latitude || p.ip_lat; });
  if (first !== -1 && selectedIndex === -1) selectPing(first);
}

async function loadPings() {
  markers.forEach(function(m){ if(m) map.removeLayer(m); });
  markers = []; selectedIndex = -1;
  try {
    var res = await fetch(SUPABASE_URL+'/rest/v1/locations?select=*&order=id.desc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY }
    });
    pings = await res.json();
    if (!Array.isArray(pings)) throw new Error('bad response');
    renderList();
  } catch(e) {
    document.getElementById('pingList').innerHTML =
      '<div class="state-box"><span style="color:var(--danger)">Failed to load. Check your Supabase keys.</span></div>';
  }
}

loadPings();
setInterval(loadPings, 30000);
</script>
</body>
</html>
